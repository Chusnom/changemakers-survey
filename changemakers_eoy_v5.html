<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changemakers · End-of-Year Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0f0f0f;--white:#fafaf7;--ink:#1a1a1a;--muted:#888880;
  --border:#e0ded8;--track:#eeede8;--surface:#f4f3ef;
  --teal:#1D9E75;--purple:#7F77DD;--coral:#D85A30;
  --amber:#BA7517;--pink:#D4537E;--navy:#2a3a6e;
  --r:12px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.6;overflow-x:hidden}

.site-header{background:var(--black);color:#fff;padding:1.25rem 1.5rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.site-logo{height:28px;width:auto;flex-shrink:0}
.header-center{flex:1;text-align:center}
.header-survey-label{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;opacity:.6}
.prog-wrap{flex:1;max-width:180px;height:3px;background:rgba(255,255,255,.15);border-radius:2px}
.prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s ease;width:0%}
.step-label{font-size:11px;color:rgba(255,255,255,.5);margin-left:.5rem;white-space:nowrap}

main{max-width:740px;margin:0 auto;padding:3rem 1.5rem 6rem;position:relative}

/* ── CAROUSEL ── */
.screen{display:none;opacity:0}
.screen.active{display:block;animation:slideIn .32s ease forwards}
.screen.exit-left{display:block;animation:slideOutLeft .25s ease forwards;pointer-events:none}
.screen.exit-right{display:block;animation:slideOutRight .25s ease forwards;pointer-events:none}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.screen.active.from-left{animation-name:slideInFromLeft}
@keyframes slideInFromLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.btn{border:none;border-radius:100px;padding:.7rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.btn-next{background:var(--ink);color:#fff}
.btn-next:hover{background:#333;transform:translateY(-1px)}
.btn-back{background:var(--surface);color:var(--ink)}
.btn-back:hover{background:var(--border)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none}
.nav-spacer{flex:1}

/* INTRO */
.intro-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.intro h2{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:400;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
.intro p{color:var(--muted);font-size:15px;max-width:560px;margin-bottom:.6rem}

.sec-label{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem}
.sec-head{margin-bottom:1.4rem}
.sec-head .sec-label{margin-bottom:.5rem}
.sec-head h3{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3.5vw,1.9rem);font-weight:400;line-height:1.15;letter-spacing:-.015em;margin-bottom:.4rem}
.sec-head p{color:var(--muted);font-size:14px;max-width:560px}

.two-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem}
.three-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.5rem}
.sel-card{border:1.5px solid var(--border);border-radius:var(--r);padding:.9rem .7rem;cursor:pointer;transition:all .18s;background:var(--white);text-align:center;user-select:none}
.sel-card:hover{border-color:#aaa}
.sel-card.on{border-color:var(--ink);background:var(--ink);color:#fff}
.sel-card .sc-name{font-size:13px;font-weight:500}
.sel-card .sc-sub{font-size:11px;opacity:.6;margin-top:2px}
.txt-field{display:block;margin-bottom:1rem}
.txt-field label{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem}
.txt-field input{width:100%;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);padding:.8rem 1rem;font:inherit;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s}
.txt-field input:focus{border-color:var(--ink)}

/* Q-CARD */
.q-card{border:1.5px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.5rem;background:var(--white)}
.q-card.done{border-color:var(--ink)}
.q-topic{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.q-text{font-family:'DM Serif Display',serif;font-size:clamp(1.05rem,2.5vw,1.35rem);line-height:1.3;letter-spacing:-.01em;margin-bottom:.25rem}
.q-note{font-size:12px;color:var(--muted);margin-top:.4rem;font-style:italic}

/* AXIS */
.axis-linear{margin:1.5rem 0}
.axis-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.4rem}
.axis-track{position:relative;height:6px;background:var(--track);border-radius:3px;cursor:pointer;touch-action:none}
.axis-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:var(--ink);border:3px solid var(--white);box-shadow:0 0 0 1.5px var(--ink);cursor:grab;transition:transform .1s;left:50%}
.axis-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15)}
.axis-val{text-align:center;font-size:11px;color:var(--muted);margin-top:.5rem;min-height:18px}

/* SHAPES */
.shape-section{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.shape-sec-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.shape-grid{display:grid;gap:.6rem;grid-template-columns:repeat(5,1fr)}
.shape-grid.four{grid-template-columns:repeat(4,1fr)}
.shape-btn{border:1.5px solid var(--border);border-radius:8px;padding:.75rem .5rem;cursor:pointer;text-align:center;background:var(--white);transition:all .15s;user-select:none}
.shape-btn:hover{border-color:#aaa}
.shape-btn.on{border-color:var(--ink);background:var(--ink)}
.shape-btn.on .sh-name{color:#fff}.shape-btn.on .sh-desc{color:rgba(255,255,255,.6)}
.sh-icon{margin:0 auto .4rem;display:flex;align-items:center;justify-content:center;height:26px}
.sh-name{font-size:11px;font-weight:500;color:var(--ink);margin-bottom:2px}
.sh-desc{font-size:10px;color:var(--muted);line-height:1.3}
.ic-circle{width:18px;height:18px;border-radius:50%}
.ic-square{width:16px;height:16px;border-radius:2px}
.ic-triangle{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent}
.ic-heart{font-size:18px;line-height:1}
.ic-rhombus{width:15px;height:15px;transform:rotate(45deg);border-radius:1px}
.shape-btn.on .ic-circle,.shape-btn.on .ic-square,.shape-btn.on .ic-rhombus{background:rgba(255,255,255,.9)!important}
.shape-btn.on .ic-triangle{border-bottom-color:rgba(255,255,255,.9)!important}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin:1rem 0 .25rem}
.chip{border:1.5px solid var(--border);border-radius:100px;background:var(--white);padding:.5rem .9rem;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:#aaa}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip-count{font-size:11px;color:var(--muted);margin-top:.4rem}
.other-specify{margin-top:.6rem;animation:slideIn .25s ease}
.other-specify input{width:100%;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);padding:.6rem 1rem;font:inherit;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.other-specify input:focus{border-color:var(--ink);background:var(--white)}

/* BB PICKER */
.bb-filter{width:100%;border:1.5px solid var(--border);border-radius:100px;background:var(--surface);padding:.55rem 1rem;font:inherit;font-size:13px;color:var(--ink);outline:none;margin:1rem 0 .75rem}
.bb-filter:focus{border-color:var(--ink);background:var(--white)}
.bb-cloud{display:flex;flex-wrap:wrap;gap:.45rem;max-height:220px;overflow-y:auto;padding:.25rem .25rem .25rem 0}
.bb-cloud::-webkit-scrollbar{width:6px}.bb-cloud::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.bb-chip{border:1.5px solid var(--border);border-radius:100px;background:var(--white);padding:.42rem .8rem;font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .12s;user-select:none}
.bb-chip:hover{border-color:#aaa}
.bb-chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.bb-chip.hide{display:none}
.bb-picked{font-size:12px;color:var(--muted);margin-top:.6rem;min-height:16px}
.bb-picked b{color:var(--ink);font-weight:500}
.other-wrap{margin-top:.75rem;display:flex;gap:.5rem;align-items:center}
.other-wrap input{flex:1;border:1.5px solid var(--border);border-radius:100px;background:var(--surface);padding:.5rem 1rem;font:inherit;font-size:12.5px;color:var(--ink);outline:none}
.other-wrap input:focus{border-color:var(--ink);background:var(--white)}
.other-wrap .btn{padding:.5rem 1.2rem;font-size:12px}

/* MATRIX */
.matrix{margin:1rem 0 .25rem}
.mx-head{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:.4rem;margin-bottom:.4rem}
.mx-head span{font-size:9.5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);text-align:center;align-self:end}
.mx-row{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:.4rem;align-items:center;padding:.55rem 0;border-top:1px solid var(--track)}
.mx-row p{font-size:13px;line-height:1.4;padding-right:.5rem}
.mx-opt{border:1.5px solid var(--border);border-radius:8px;background:var(--white);height:30px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
.mx-opt:hover{border-color:#aaa}
.mx-opt.on{background:var(--ink);border-color:var(--ink)}
.mx-opts{display:contents}

/* TEXTAREA */
.ta-field{margin:1.25rem 0}
.ta-field .ta-label{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:.5rem;line-height:1.4}
.ta-field .ta-label em{font-style:normal;color:var(--muted);font-weight:400;font-size:12px}
.ta-field textarea{width:100%;min-height:96px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);padding:.8rem 1rem;font:inherit;font-size:14px;line-height:1.5;color:var(--ink);outline:none;resize:vertical;transition:border-color .15s}
.ta-field textarea:focus{border-color:var(--ink)}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.three-col .ta-field{margin:0}
.three-col textarea{min-height:110px}

/* RATING CARDS */
.rating-stack{display:grid;gap:1.25rem;margin-top:1.25rem}
.rating-card{border:1.5px solid var(--border);border-radius:var(--r);padding:1.5rem;background:var(--surface)}
.rating-card h4{font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400;margin-bottom:.25rem}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:.5rem;margin:1rem 0 .25rem}

/* ERR + SUCCESS */
.err-banner{display:none;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;padding:.75rem 1rem;border-radius:8px;font-size:13px;margin:1rem 0}
.needs{border-color:var(--coral)!important;box-shadow:0 0 0 2px rgba(216,90,48,.15)}
#success{display:none;text-align:center;padding:5rem 1.5rem;max-width:480px;margin:0 auto}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-size:28px;color:#fff}
#success h2{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;margin-bottom:1rem}
#success p{color:var(--muted);font-size:15px;margin-bottom:1.5rem}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--ink);padding:.7rem 1.6rem;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:100px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--ink)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:560px){
  .two-grid,.three-grid{grid-template-columns:1fr 1fr}
  .three-col{grid-template-columns:1fr}
  .shape-grid,.shape-grid.four{grid-template-columns:repeat(2,1fr)}
  .mx-head{display:none}
  .mx-row{grid-template-columns:1fr;gap:.35rem}
  .mx-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem}
  .mx-opt{color:var(--muted);font-size:9px}
  .mx-opt.on{color:#fff}
}
</style>
</head>

function shapeIconHTML(s){
  if(s.type==='circle')   return `<span class="ic-circle" style="background:${s.color}"></span>`;
  if(s.type==='square')   return `<span class="ic-square" style="background:${s.color}"></span>`;
  if(s.type==='triangle') return `<span class="ic-triangle" style="border-bottom:16px solid ${s.color}"></span>`;
  if(s.type==='heart')    return `<span class="ic-heart" style="color:${s.color}">♥</span>`;
  return `<span class="ic-rhombus" style="background:${s.color}"></span>`;
}
function shapesHTML(qid,set){
  const cols = set.length<=4 ? ' four' : '';
  return `<div class="shape-section"><div class="shape-sec-label">Step 2 — Now pick your sticker shape</div>
    <div class="shape-grid${cols}" data-shapes="${qid}">`+
    set.map(s=>`<div class="shape-btn" data-q="${qid}" data-k="${s.key}"><div class="sh-icon">${shapeIconHTML(s)}</div><div class="sh-name">${s.key}</div><div class="sh-desc">${esc(s.desc)}</div></div>`).join('')+
    `</div></div>`;
}
function axisHTML(id,left,right){
  AX[id] = AX[id] || {val:5,moved:false};
  return `<div class="axis-linear"><div class="axis-ends"><span>${esc(left)}</span><span>${esc(right)}</span></div>
    <div class="axis-track" data-axis="${id}"><div class="axis-thumb" id="th_${id}" style="left:50%"></div></div>
    <div class="axis-val" id="av_${id}">Drag the dot to answer</div></div>`;
}
function taHTML(name,label,ph,optional){
  return `<div class="ta-field" id="taw_${name}"><div class="ta-label">${esc(label)}${optional?' <em>· optional</em>':''}</div>
    <textarea id="ta_${name}" placeholder="${esc(ph||'')}"></textarea></div>`;
}
function chipsHTML(group,list,limit){
  CH[group]=CH[group]||[];
  const hasOther = list.includes('Other');
  return `<div class="chips" data-chips="${group}" data-limit="${limit||0}">`+
    list.map(x=>`<span class="chip" data-v="${esc(x)}">${esc(x)}</span>`).join('')+
    `</div>${limit?`<div class="chip-count" id="cc_${group}">0/${limit} selected</div>`:''}`+
    (hasOther?`<div class="other-specify" id="os_${group}" style="display:none"><input type="text" id="osi_${group}" placeholder="Please specify…"></div>`:'');
}
function pillsHTML(group,list){
  return `<div class="pills" data-pills="${group}">`+list.map(x=>`<span class="chip" data-v="${esc(x)}">${esc(x)}</span>`).join('')+`</div>`;
}
function matrixHTML(prefix,rows){
  let h = `<div class="matrix" id="mx_${prefix}"><div class="mx-head"><span></span>${AGREE.map(a=>`<span>${a}</span>`).join('')}</div>`;
  rows.forEach((r,i)=>{
    const n = `${prefix}_m${i+1}`;
    h += `<div class="mx-row" id="mxr_${n}"><p>${esc(r)}</p><div class="mx-opts">`+
      AGREE.map(a=>`<div class="mx-opt" data-mx="${n}" data-v="${esc(a)}" title="${esc(a)}">${esc(a)}</div>`).join('')+
      `</div></div>`;
  });
  return h+`</div>`;
}
function bbCloudHTML(key,multi){
  return `<input class="bb-filter" data-filter="${key}" type="text" placeholder="Type to filter Building Blocks…">
    <div class="bb-cloud" data-cloud="${key}" data-multi="${multi?1:0}">`+
    BB.map(b=>`<span class="bb-chip" data-v="${esc(b)}">${esc(b)}</span>`).join('')+
    `</div>
    <div class="other-wrap"><input type="text" id="other_${key}" placeholder="Other — type a name not in the list"><button class="btn btn-back" type="button" data-add-other="${key}">Add</button></div>
    <div class="bb-picked" id="bp_${key}"></div>`;
}
function nav(showBack,nextLabel,isSubmit){
  return `<div class="nav">${showBack?'<button class="btn btn-back" type="button" data-go="back">Back</button>':'<span class="nav-spacer"></span>'}
    <button class="btn btn-next" type="button" data-go="${isSubmit?'submit':'next'}">${nextLabel||'Continue'}</button></div>`;
}

// CAROUSEL ENGINE
// ════════════════════════════════════════════════════
const allScreens = buildScreens();

function rebuildFlow(){
  flow = allScreens.filter(s=>{
    if(!s.cond) return true;
    if(s.cond==='y1') return S.year && S.year.startsWith('Year 1');
    if(s.cond==='y2') return S.year && S.year.startsWith('Year 2');
    return true;
  });
}

function renderAllScreens(){
  const wrap = $('survey');
  wrap.innerHTML = allScreens.map(s =>
    `<div class="screen" id="scr_${s.id}">${s.html}</div>`
  ).join('');
}

function goTo(idx, direction){
  rebuildFlow();
  const prev = flow[curStep];
  const next = flow[idx];
  if(!next) return;
  const prevEl = $('scr_'+prev.id);
  const nextEl = $('scr_'+next.id);
  if(prevEl){
    prevEl.classList.remove('active','from-left');
    prevEl.classList.add(direction>0?'exit-left':'exit-right');
    setTimeout(()=>{prevEl.classList.remove('exit-left','exit-right');},260);
  }
  curStep = idx;
  setTimeout(()=>{
    nextEl.classList.add('active');
    if(direction<0) nextEl.classList.add('from-left');
    else nextEl.classList.remove('from-left');
    updateProgress();
    if(window.scrollTo) window.scrollTo({top:0,behavior:'smooth'});
    // rebuild rating cards when entering those screens
    if(next.id==='top3-rate') rebuildRatings('top3');
    if(next.id==='grow3-rate') rebuildRatings('grow3');
  }, direction===0?0:120);

  if(next.id==='thanks'){
    $('survey').style.display='none';
    $('success').style.display='block';
  }
}

function updateProgress(){
  rebuildFlow();
  const total = flow.length - 2; // exclude welcome and thanks
  const cur = Math.max(0, curStep - 1);
  const pct = total>0 ? Math.round(cur/total*100) : 0;
  $('pFill').style.width = Math.min(100,pct)+'%';
  const sid = flow[curStep]?.id;
  $('stepLabel').textContent = sid==='welcome'?'':sid==='thanks'?'Done':`${curStep} / ${flow.length-2}`;
}

// ════════════════════════════════════════════════════
// VALIDATION PER SCREEN
// ════════════════════════════════════════════════════
function ta(name){ const el=$('ta_'+name); return el?el.value.trim():''; }
function axOK(id){ return AX[id]?.moved && SH_[id]; }

function validateCurrent(){
  rebuildFlow();
  const sid = flow[curStep].id;
  const errs = [];
  const showErr = (bannerId,msg)=>{
    const b = $(bannerId);
    if(b){ b.textContent='⚠ '+msg; b.style.display='block'; }
    else errs.push(msg);
  };

  if(sid==='profile'){
    const b = $('errProfile');
    b.style.display='none'; b.textContent='';
    if(!S.name){ showErr('errProfile','Add your name.'); return false; }
    if(!/.+@.+\..+/.test(S.email)){ showErr('errProfile','Add a valid email.'); return false; }
    if(!S.year){ showErr('errProfile','Choose your Changemakers year.'); return false; }
    if(!S.pathway){ showErr('errProfile','Choose your learning pathway.'); return false; }
    return true;
  }
  if(sid==='overall'){
    if(!AX.overall?.moved) return alert('Drag the dot to rate your year.'), false;
    if(!SH_.overall) return alert('Pick a sticker shape for overall experience.'), false;
    if(!ta('overall_reason')) return alert('Tell us the main reason for your score.'), false;
    if(!(CH.year_words||[]).length) return alert('Choose at least 1 word that describes your year.'), false;
    if(!ta('engaged_moments')) return alert('Share what engaged or inspired you.'), false;
    return true;
  }
  if(sid.startsWith('award_')){
    const b = $('err_'+sid);
    if(b){ b.style.display='none'; }
    if(!AW[sid]){ showErr('err_'+sid,'Choose a Building Block for this award.'); return false; }
    return true;
  }
  if(sid==='top3-sel'){
    const b=$('err_top3'); if(b)b.style.display='none';
    if(TOP3.length!==3){ showErr('err_top3','Pick exactly 3 Building Blocks.'); return false; }
    return true;
  }
  if(sid==='top3-rate'){
    for(let i=1;i<=3;i++){
      const id='t3_'+i;
      if(!AX[id]?.moved) return alert(`Drag the dot for ${TOP3[i-1]}.`), false;
      if(!SH_[id]) return alert(`Pick a sticker for ${TOP3[i-1]}.`), false;
      if(!ta(id)) return alert(`Explain your score for ${TOP3[i-1]}.`), false;
    }
    return true;
  }
  if(sid==='grow3-sel'){
    const b=$('err_grow3'); if(b)b.style.display='none';
    if(GROW3.length!==3){ showErr('err_grow3','Pick exactly 3 Building Blocks.'); return false; }
    return true;
  }
  if(sid==='grow3-rate'){
    for(let i=1;i<=3;i++){
      const id='g3_'+i;
      if(!AX[id]?.moved) return alert(`Drag the dot for ${GROW3[i-1]}.`), false;
      if(!SH_[id]) return alert(`Pick a sticker for ${GROW3[i-1]}.`), false;
      if(!ta(id)) return alert(`Explain what should change in ${GROW3[i-1]}.`), false;
    }
    return true;
  }
  if(sid==='studios'){
    if(!(CH.studios_used||[]).length) return alert('Select the studios you used (or the "did not use" option).'), false;
    if(!PL.studio_valuable) return alert('Choose the studio that felt most valuable.'), false;
    if(!AX.studios?.moved) return alert('Drag the dot for studios usefulness.'), false;
    if(!SH_.studios) return alert('Pick a sticker for studios.'), false;
    if(!ta('studios_improve')) return alert('Tell us what would make studios better.'), false;
    return true;
  }
  if(sid==='lv'){
    if(!PL.lv_frequency) return alert('Tell us how often you used LV.'), false;
    if(!AX.lv?.moved) return alert('Drag the dot for LV usefulness.'), false;
    if(!SH_.lv) return alert('Pick a sticker for LV.'), false;
    for(let i=1;i<=7;i++) if(!MX['lv_m'+i]) return alert('Answer every row of the LV statements.'), false;
    if(!ta('lv_useful_reason')) return alert('Tell us what made LV useful or not.'), false;
    return true;
  }
  if(sid==='assess'){
    if(!AX.assess?.moved) return alert('Drag the dot for assessment clarity.'), false;
    if(!SH_.assess) return alert('Pick a sticker for assessment.'), false;
    for(let i=1;i<=3;i++) if(!MX['assess_m'+i]) return alert('Answer every row of the assessment statements.'), false;
    if(!ta('assessment_clarity_improve')) return alert('Tell us what would increase assessment clarity.'), false;
    if(!ta('assessment_reflection')) return alert('Tell us what felt unclear, frustrating, or helpful.'), false;
    if(!ta('lv_magic_wand')) return alert('Answer the magic-wand question.'), false;
    return true;
  }
  if(sid==='support'){
    if(!AX.support?.moved) return alert('Drag the dot for ownership.'), false;
    if(!SH_.support) return alert('Pick a sticker for support.'), false;
    for(let i=1;i<=6;i++) if(!MX['support_m'+i]) return alert('Answer every row of the support statements.'), false;
    if(!ta('adult_support_change')) return alert('Tell us one thing adults could do differently.'), false;
    return true;
  }
  if(sid==='community'){
    if(!ta('community_three_words')) return alert('Describe the community in three words.'), false;
    for(const n of ['cm_continue','cm_start','cm_stop','uh_continue','uh_start','uh_stop'])
      if(!ta(n)) return alert('Complete all six Continue / Start / Stop boxes.'), false;
    for(let i=1;i<=5;i++) if(!MX['community_m'+i]) return alert('Answer every row of the community statements.'), false;
    if(!AX.community?.moved) return alert('Drag the dot for community connection.'), false;
    if(!SH_.community) return alert('Pick a sticker for community.'), false;
    if(!ta('community_connected')) return alert('Tell us what helped you feel connected.'), false;
    if(!ta('community_harder')) return alert('Tell us what made connection harder.'), false;
    if(!ta('community_years')) return alert('Suggest one thing to connect Year 1 and Year 2.'), false;
    return true;
  }
  if(sid==='y1'){
    if(!ta('future_more_of')) return alert('Tell us what you want more of next year.'), false;
    if(!ta('y1_success_needs')) return alert('Tell us what you need to feel successful.'), false;
    if(!ta('y1_ownership')) return alert('Tell us what would help you take more ownership.'), false;
    if(!ta('y1_goals')) return alert('Share your goals for the coming year.'), false;
    return true;
  }
  if(sid==='y2'){
    if(!AX.exit?.moved) return alert('Drag the dot for preparedness.'), false;
    if(!SH_.exit) return alert('Pick a sticker for preparedness.'), false;
    if(!ta('exit_gave_you')) return alert('Tell us what Changemakers gave you.'), false;
    if(!ta('exit_missing')) return alert('Tell us what was missing.'), false;
    return true;
  }
  if(sid==='final'){
    if(!ta('take_seriously')) return alert('Tell Mich and Iaason what to take seriously.'), false;
    return true;
  }
  return true;
}

// ════════════════════════════════════════════════════
// TOP3 / GROW3 RATING CARDS
// ════════════════════════════════════════════════════
function persistRating(id){
  const m = id.match(/^([tg]3)_(\d)$/); if(!m) return;
  const prefix = m[1]==='t3'?'top3':'grow3';
  const arr = prefix==='top3'?TOP3:GROW3;
  const block = arr[+m[2]-1]; if(!block) return;
  RDATA[prefix][block] = {
    pos: AX[id]?.moved?AX[id].val:null,
    shape: SH_[id]||null,
    reason: ($('ta_'+id)||{}).value||''
  };
}
function rebuildRatings(key){
  const arr = key==='top3'?TOP3:GROW3;
  const pfx = key==='top3'?'t3':'g3';
  [1,2,3].forEach(i=>persistRating(pfx+'_'+i));
  const mount = $('rs_'+key); if(!mount) return;
  const ends = key==='top3'?["Wouldn't recommend",'Absolutely']:['Needs a rethink','Almost there'];
  const taLabel = key==='top3'
    ?'Why this score? What made this Building Block engaging or valuable?'
    :'What would need to change for this Building Block to be stronger?';
  let h = '';
  arr.forEach((block,idx)=>{
    const id = pfx+'_'+(idx+1);
    const saved = RDATA[key][block]||{};
    AX[id] = saved.pos!=null?{val:saved.pos,moved:true}:{val:5,moved:false};
    delete SH_[id];
    h += `<div class="rating-card"><h4>${esc(block)}</h4>
      ${axisHTML(id,ends[0],ends[1])}
      ${shapesHTML(id,SHAPES[key])}
      <div class="ta-field" style="margin-bottom:0"><div class="ta-label">${esc(taLabel)}</div>
      <textarea id="ta_${id}">${esc(saved.reason||'')}</textarea></div></div>`;
  });
  mount.innerHTML = h;
  // restore selections
  arr.forEach((block,idx)=>{
    const id = pfx+'_'+(idx+1);
    const saved = RDATA[key][block]||{};
    if(saved.pos!=null){ $('th_'+id).style.left=(saved.pos*10)+'%'; $('av_'+id).textContent=saved.pos; }
    if(saved.shape){
      SH_[id]=saved.shape;
      mount.querySelector(`.shape-btn[data-q="${id}"][data-k="${saved.shape}"]`)?.classList.add('on');
    }
  });
}

// ════════════════════════════════════════════════════
// COLLECT + SUBMIT
// ════════════════════════════════════════════════════
function chipVal(group){
  const vals = (CH[group]||[]).map(v=>{
    if(v==='Other'){
      const inp=$('osi_'+group);
      const spec=inp?inp.value.trim():'';
      return spec ? 'Other: '+spec : 'Other';
    }
    return v;
  });
  return vals.join(' | ');
}
function collect(){
  const d = {
    name:S.name, email:S.email, year:S.year||'', pathway:S.pathway||'',
    overall_pos: AX.overall?.moved?AX.overall.val:'', overall_shape: SH_.overall||'',
    overall_reason: ta('overall_reason'), year_words:chipVal('year_words'),
    engaged_moments: ta('engaged_moments'), bb_wish_existed: ta('bb_wish_existed'),
  };
  AWARDS.forEach(([k])=> d[k]=AW[k]||'');
  [['top3',TOP3,'t3'],['grow3',GROW3,'g3']].forEach(([key,arr,pfx])=>{
    [1,2,3].forEach(i=>{
      persistRating(pfx+'_'+i);
      const id=pfx+'_'+i;
      d[`${key}_${i}_block`]=arr[i-1]||'';
      d[`${key}_${i}_pos`]= AX[id]?.moved?AX[id].val:'';
      d[`${key}_${i}_shape`]= SH_[id]||'';
      d[`${key}_${i}_reason`]= ta(id);
    });
  });
  Object.assign(d,{
    studios_used:chipVal('studios_used'), studio_valuable:PL.studio_valuable||'',
    studios_pos:AX.studios?.moved?AX.studios.val:'', studios_shape:SH_.studios||'',
    studio_blockers:chipVal('studio_blockers'), studios_improve:ta('studios_improve'),
    lv_frequency:PL.lv_frequency||'', lv_pos:AX.lv?.moved?AX.lv.val:'', lv_shape:SH_.lv||'',
    lv_useful_reason:ta('lv_useful_reason'),
    assess_pos:AX.assess?.moved?AX.assess.val:'', assess_shape:SH_.assess||'',
    assessment_clarity_improve:ta('assessment_clarity_improve'),
    assessment_reflection:ta('assessment_reflection'), lv_magic_wand:ta('lv_magic_wand'),
    support_pos:AX.support?.moved?AX.support.val:'', support_shape:SH_.support||'',
    voice_opportunities:chipVal('voice_opportunities'),
    support_needed:chipVal('support_needed'),
    adult_support_change:ta('adult_support_change'),
    community_three_words:ta('community_three_words'),
    cm_continue:ta('cm_continue'), cm_start:ta('cm_start'), cm_stop:ta('cm_stop'),
    uh_continue:ta('uh_continue'), uh_start:ta('uh_start'), uh_stop:ta('uh_stop'),
    community_pos:AX.community?.moved?AX.community.val:'', community_shape:SH_.community||'',
    community_connected:ta('community_connected'), community_harder:ta('community_harder'),
    community_years:ta('community_years'),
    future_subjects:chipVal('future_subjects'), future_more_of:ta('future_more_of'),
    future_aps:chipVal('future_aps'),
    y1_success_needs:ta('y1_success_needs'), y1_ownership:ta('y1_ownership'), y1_goals:ta('y1_goals'),
    exit_pos:AX.exit?.moved?AX.exit.val:'', exit_shape:SH_.exit||'',
    exit_gave_you:ta('exit_gave_you'), exit_missing:ta('exit_missing'), exit_advice:ta('exit_advice'),
    take_seriously:ta('take_seriously'), anything_else:ta('anything_else'),
  });
  for(let i=1;i<=7;i++) d['lv_m'+i]=MX['lv_m'+i]||'';
  for(let i=1;i<=3;i++) d['assess_m'+i]=MX['assess_m'+i]||'';
  for(let i=1;i<=6;i++) d['support_m'+i]=MX['support_m'+i]||'';
  for(let i=1;i<=5;i++) d['community_m'+i]=MX['community_m'+i]||'';
  return d;
}

let lastResponse = {};
async function submitForm(){
  const data = collect();
  lastResponse = data;
  const btn = document.querySelector('.screen.active [data-go="submit"]');
  if(btn){ btn.disabled=true; btn.textContent='Sending…'; }

  // Send to Google Apps Script → Sheet + email
  if(APPS_SCRIPT_URL){
    try{
      await fetch(APPS_SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({...data, _email:NOTIFY_EMAIL}).toString()
      });
    }catch(e){ console.warn('Apps Script POST failed',e); }
  }

  // Show success
  rebuildFlow();
  curStep = flow.length-1;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','exit-left','exit-right'));
  $('survey').style.display='none';
  $('success').style.display='block';
  if(!APPS_SCRIPT_URL){
    const p=document.createElement('p'); p.style.cssText='color:var(--coral);font-size:13px;margin-bottom:1rem';
    p.textContent='⚠ No Apps Script URL configured — this response was not saved anywhere. Download your JSON as backup and check the setup guide.';
    $('success').insertBefore(p,$('dlJson'));
  }
  updateProgress();
  if(window.scrollTo) window.scrollTo({top:0,behavior:'smooth'});
}

// ════════════════════════════════════════════════════
// EVENT DELEGATION
// ════════════════════════════════════════════════════
function setAxis(id, clientX, track){
  const r = track.getBoundingClientRect();
  let pct = ((clientX-r.left)/r.width)*100;
  pct = Math.max(0,Math.min(100,pct));
  const v = Math.round(pct/10);
  AX[id]={val:v,moved:true};
  $('th_'+id).style.left=(v*10)+'%';
  $('av_'+id).textContent=v;
  if(id.startsWith('t3_')||id.startsWith('g3_')) persistRating(id);
}
document.addEventListener('pointerdown',e=>{
  const track=e.target.closest('.axis-track');
  if(!track) return;
  e.preventDefault();
  const id=track.dataset.axis;
  setAxis(id,e.clientX,track);
  const move=ev=>setAxis(id,ev.clientX,track);
  const up=()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);};
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
});

document.addEventListener('click',e=>{
  // NAV
  const go = e.target.closest('[data-go]');
  if(go){
    const action = go.dataset.go;
    rebuildFlow();
    if(action==='back'){ goTo(curStep-1,-1); return; }
    if(action==='next'){
      if(!validateCurrent()) return;
      goTo(curStep+1,1); return;
    }
    if(action==='submit'){
      if(!validateCurrent()) return;
      submitForm(); return;
    }
    return;
  }

  // SHAPES
  const sb = e.target.closest('.shape-btn');
  if(sb){
    const q=sb.dataset.q;
    sb.parentElement.querySelectorAll('.shape-btn').forEach(x=>x.classList.remove('on'));
    sb.classList.add('on');
    SH_[q]=sb.dataset.k;
    if(q.startsWith('t3_')||q.startsWith('g3_')) persistRating(q);
    return;
  }

  // CHIPS (multi)
  const chip = e.target.closest('[data-chips] .chip');
  if(chip){
    const wrap=chip.closest('[data-chips]');
    const g=wrap.dataset.chips, lim=+wrap.dataset.limit;
    CH[g]=CH[g]||[];
    if(chip.classList.contains('on')){chip.classList.remove('on');CH[g]=CH[g].filter(x=>x!==chip.dataset.v);}
    else{if(lim&&CH[g].length>=lim)return;chip.classList.add('on');CH[g].push(chip.dataset.v);}
    const cc=$('cc_'+g);if(cc)cc.textContent=`${CH[g].length}/${lim} selected`;
    // show/hide "Other" text input
    if(chip.dataset.v==='Other'){
      const os=$('os_'+g);
      if(os){
        const show=chip.classList.contains('on');
        os.style.display=show?'block':'none';
        if(!show){const inp=$('osi_'+g);if(inp)inp.value='';}
        else{const inp=$('osi_'+g);if(inp)setTimeout(()=>inp.focus(),50);}
      }
    }
    return;
  }

  // PILLS (single)
  const pill = e.target.closest('[data-pills] .chip');
  if(pill){
    const wrap=pill.closest('[data-pills]');
    wrap.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    pill.classList.add('on');
    PL[wrap.dataset.pills]=pill.dataset.v;
    return;
  }

  // MATRIX
  const mx = e.target.closest('.mx-opt');
  if(mx){
    mx.closest('.mx-row').querySelectorAll('.mx-opt').forEach(x=>x.classList.remove('on'));
    mx.classList.add('on');
    MX[mx.dataset.mx]=mx.dataset.v;
    return;
  }

  // BB CHIPS (awards/top3/grow3)
  const bb = e.target.closest('.bb-chip');
  if(bb){
    const cloud=bb.closest('.bb-cloud');
    const key=cloud.dataset.cloud, multi=cloud.dataset.multi==='1';
    if(!multi){
      cloud.querySelectorAll('.bb-chip').forEach(x=>x.classList.remove('on'));
      bb.classList.add('on');
      AW[key]=bb.dataset.v;
      $('bp_'+key).innerHTML='Selected: <b>'+esc(AW[key])+'</b>';
    } else {
      const arr=key==='top3'?TOP3:GROW3;
      const i=arr.indexOf(bb.dataset.v);
      if(i>-1){arr.splice(i,1);bb.classList.remove('on');}
      else{if(arr.length>=3)return;arr.push(bb.dataset.v);bb.classList.add('on');}
      $('bp_'+key).innerHTML=`${arr.length}/3 selected`+(arr.length?' — <b>'+arr.map(esc).join('</b> · <b>')+'</b>':'');
    }
    return;
  }

  // ADD OTHER (awards)
  const addOther = e.target.closest('[data-add-other]');
  if(addOther){
    const key = addOther.dataset.addOther;
    const input = $('other_'+key);
    const val = input.value.trim();
    if(!val) return;
    const cloud = document.querySelector(`[data-cloud="${key}"]`);
    const multi = cloud.dataset.multi==='1';
    // create new chip with "Other: " prefix if not in BB list
    const label = BB.includes(val) ? val : 'Other: '+val;
    if(!multi){
      cloud.querySelectorAll('.bb-chip').forEach(x=>x.classList.remove('on'));
      const newChip = document.createElement('span');
      newChip.className='bb-chip on'; newChip.dataset.v=label; newChip.textContent=label;
      cloud.prepend(newChip);
      AW[key]=label;
      $('bp_'+key).innerHTML='Selected: <b>'+esc(label)+'</b>';
    } else {
      const arr=key==='top3'?TOP3:GROW3;
      if(arr.length>=3) return;
      const newChip = document.createElement('span');
      newChip.className='bb-chip on'; newChip.dataset.v=label; newChip.textContent=label;
      cloud.prepend(newChip);
      arr.push(label);
      $('bp_'+key).innerHTML=`${arr.length}/3 selected — <b>`+arr.map(esc).join('</b> · <b>')+'</b>';
    }
    input.value='';
    return;
  }

  // SEL-CARDS (year / pathway)
  const yc = e.target.closest('#yearGrid .sel-card');
  if(yc){
    document.querySelectorAll('#yearGrid .sel-card').forEach(x=>x.classList.remove('on'));
    yc.classList.add('on'); S.year=yc.dataset.year;
    rebuildFlow(); return;
  }
  const pc = e.target.closest('#pathGrid .sel-card');
  if(pc){
    document.querySelectorAll('#pathGrid .sel-card').forEach(x=>x.classList.remove('on'));
    pc.classList.add('on'); S.pathway=pc.dataset.path;
    return;
  }
});

document.addEventListener('input',e=>{
  if(e.target.id==='fName') S.name=e.target.value.trim();
  if(e.target.id==='fEmail') S.email=e.target.value.trim();
  if(e.target.matches('.bb-filter')){
    const q=e.target.value.toLowerCase();
    e.target.nextElementSibling.querySelectorAll('.bb-chip').forEach(c=>{
      c.classList.toggle('hide',q&&!c.dataset.v.toLowerCase().includes(q));
    });
  }
  if(e.target.matches('textarea')){
    const id=e.target.id;
    if(id&&(id.startsWith('ta_t3_')||id.startsWith('ta_g3_'))) persistRating(id.slice(3));
  }
});

$('dlJson').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(lastResponse,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='changemakers-feedback.json';a.click();
});

// INIT
// ════════════════════════════════════════════════════
renderAllScreens();
rebuildFlow();
$('scr_welcome').classList.add('active');
updateProgress();
